# Docker Compose for local development and testing
# Run: docker-compose up --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - IC_NAME=Resgrid IC
      - IC_SCHEME=ResgridIC
      - IC_BUNDLE_ID=com.resgrid.command
      - IC_PACKAGE=com.resgrid.command
      - IC_VERSION=0.0.1
      - IC_BASE_API_URL=https://api.resgrid.com
      - IC_API_VERSION=v4
      - IC_RESGRID_API_URL=/api/v4
      - IC_CHANNEL_HUB_NAME=eventingHub
      - IC_REALTIME_GEO_HUB_NAME=geolocationHub
      - IC_LOGGING_KEY=
      - IC_APP_KEY=
      - IC_MAPBOX_PUBKEY=
      - IC_SENTRY_DSN=
      - IC_COUNTLY_APP_KEY=
      - IC_COUNTLY_SERVER_URL=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
